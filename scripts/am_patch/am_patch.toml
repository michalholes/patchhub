verbosity = "normal" # debug | verbose | normal | quiet
log_level = "normal" # quiet | normal | warning | verbose | debug
console_color = "auto" # auto | always | never
runner_subprocess_timeout_s = 1800
json_out = false
run_all_tests = true
target_repo_name = ""

# IPC (Unix domain socket)
ipc_socket_enabled = true
ipc_socket_mode = "patch_dir"
ipc_socket_name_template = "am_patch.sock"
ipc_socket_cleanup_delay_success_s = 3
ipc_socket_cleanup_delay_failure_s = 3
ipc_socket_on_startup_exists = "fail"
ipc_socket_on_startup_wait_s = 0
ipc_handshake_enabled = false
ipc_handshake_wait_s = 0

# Success archive naming stays bootstrap-owned.
success_archive_name = "{repo}-{branch}_{issue}.zip"
success_archive_dir = "patch_dir"
success_archive_cleanup_glob_template = ""
success_archive_keep_count = 0

# Workspace/layout paths stay bootstrap-owned.
patch_dir_name = "patches"
patch_layout_logs_dir = "logs"
patch_layout_json_dir = "json"
patch_layout_workspaces_dir = "workspaces"
patch_layout_successful_dir = "successful"
patch_layout_unsuccessful_dir = "unsuccessful"
lockfile_name = "am_patch.lock"
current_log_symlink_name = "am_patch.log"
current_log_symlink_enabled = true
log_ts_format = "%Y%m%d_%H%M%S"
failure_zip_template = "patched_issue{issue}_v{attempt:02d}.zip"
failure_zip_cleanup_glob_template = "patched_issue{issue}_*.zip"
failure_zip_keep_per_issue = 1
failure_zip_delete_on_success_commit = true
self_backup_mode = "initial_self_patch"
self_backup_dir = "patches/quarantine"
self_backup_template = "amp_self_backup_issue{issue}_{ts}.zip"
self_backup_include_relpaths = ["scripts/am_patch.py", "scripts/am_patch/"]
venv_bootstrap_mode = "never"
venv_bootstrap_python = ".venv/bin/python"
unified_patch_continue = false
update_workspace = false
soft_reset_workspace = false
test_mode = false
test_mode_isolate_patch_dir = true
delete_workspace_on_success = true
allow_no_op = false
skip_up_to_date = false
allow_non_main = false
rollback_workspace_on_fail = "always"
patch_jail = false
patch_jail_unshare_net = true
live_repo_guard = true
live_repo_guard_scope = "patch"
gates_order = [
  "dont-touch",
  "compile",
  "js",
  "biome",
  "typescript",
  "ruff",
  "pytest",
  "mypy",
  "monolith",
  "docs",
]

[paths]
# Canonical (optional; runner may infer)
# active_target_repo_root = "."
# target_repo_roots accepts token=root bindings.
# Example bindings are resolved against runner_root.
# Root-only canonical /home/pi/<name> entries stay as legacy compatibility input.
target_repo_roots = ["patchhub=.", "audiomason2=../audiomason2"]
target_repo_config_relpath = "am_patch.repo.toml"

# patch_dir = "patches"
