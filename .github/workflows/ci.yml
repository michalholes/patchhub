name: ci

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install -U pip
          python -m pip install -e ".[dev]"

      - name: Install bubblewrap
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap
          bwrap --version

      - name: Ruff
        run: |
          . .venv/bin/activate
          python -m ruff check scripts tests 

      - name: Mypy
        run: |
          . .venv/bin/activate
          python -m mypy scripts

      - name: Install Playwright browser
        run: |
          . .venv/bin/activate
          python -m playwright install --with-deps --only-shell



      - name: Pytest
        run: |
          . .venv/bin/activate
          pytest


      - name: Detect BadGuys trigger changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          zero=0000000000000000000000000000000000000000
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
          else
            base_sha="${{ github.event.before }}"
          fi

          if [ "$base_sha" != "$zero" ] && ! git cat-file -e "$base_sha^{commit}" 2>/dev/null; then
            git fetch --no-tags --depth=1 origin "$base_sha"
          fi

          if [ "$base_sha" = "$zero" ]; then
            changed_files="$(git diff-tree --no-commit-id --name-only -r HEAD -- \
              scripts/am_patch.py \
              scripts/am_patch.md \
              scripts/am_patch_specification.md \
              scripts/am_patch_instructions.md \
              scripts/am_patch/)"
          else
            changed_files="$(git diff --name-only "$base_sha..HEAD" -- \
              scripts/am_patch.py \
              scripts/am_patch.md \
              scripts/am_patch_specification.md \
              scripts/am_patch_instructions.md \
              scripts/am_patch/)"
          fi

          if [ -n "$changed_files" ]; then
            echo "badguys=true" >> "$GITHUB_OUTPUT"
          else
            echo "badguys=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Badguys
        if: steps.changes.outputs.badguys == 'true'
        run: |
          ./.venv/bin/python badguys/badguys.py \
            --no-suite-jail \
            --per-run-logs-post-run keep_all \
            --exclude=test_086_pytest_gate_runs_on_targeted_python_change \
            --exclude=test_064_a_allows_undeclared \
            --exclude=test_900_commit_push_timestamp



      - name: Collect CI logs (always)
        if: always()
        run: |
          mkdir -p ci_artifacts
          cp -a patches/logs/*.log ci_artifacts/ || true
          cp -a patches/badguys_*.log ci_artifacts/ || true
          if [ -d patches/badguys_logs ]; then
            mkdir -p ci_artifacts/badguys_logs
            cp -a patches/badguys_logs/. ci_artifacts/badguys_logs/
          fi
          find ci_artifacts -maxdepth 4 -type f | sort || true

      - name: Upload artifacts (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs
          path: ci_artifacts
