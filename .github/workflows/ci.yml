name: ci

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install -U pip
          python -m pip install -e ".[dev]"

      - name: Install bubblewrap
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap
          bwrap --version

      - name: Ruff
        run: |
          . .venv/bin/activate
          python -m ruff check scripts tests 

      - name: Mypy
        run: |
          . .venv/bin/activate
          python -m mypy scripts

      - name: Install Playwright browser
        run: |
          . .venv/bin/activate
          python -m playwright install --with-deps --only-shell



      - name: Pytest
        run: |
          . .venv/bin/activate
          pytest

      - name: Detect changes in scripts/
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            scripts:
              - 'scripts/**'


      - name: Badguys
        if: steps.changes.outputs.scripts == 'true'
        run: |
          ./.venv/bin/python badguys/badguys.py \
            --no-suite-jail \
            --per-run-logs-post-run keep_all \
            --exclude=test_064_a_allows_undeclared \
            --exclude=test_900_commit_push_timestamp

      - name: Collect CI logs (always)
        if: always()
        run: |
          mkdir -p ci_artifacts
          cp -a patches/logs/*.log ci_artifacts/ || true
          cp -a patches/badguys_*.log ci_artifacts/ || true
          if [ -d patches/badguys_logs ]; then
            mkdir -p ci_artifacts/badguys_logs
            cp -a patches/badguys_logs/. ci_artifacts/badguys_logs/
          fi
          find ci_artifacts -maxdepth 4 -type f | sort || true

      - name: Upload artifacts (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs
          path: ci_artifacts
